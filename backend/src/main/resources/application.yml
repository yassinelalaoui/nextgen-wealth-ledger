spring:
  application:
    name: digital-banking-app

  profiles:
    active: ${APP_PROFILE:dev}

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/digital_bank?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        use_sql_comments: true
    show-sql: false
    open-in-view: false

  web:
    cors:
      allowed-origins: "http://localhost:4200,http://localhost:3000"
      allowed-methods: "GET,POST,PUT,DELETE,OPTIONS,PATCH"
      allowed-headers: "*"
      allow-credentials: true
      max-age: 3600

server:
  port: ${SERVER_PORT:8085}
  servlet:
    context-path: /

logging:
  level:
    root: INFO
    ma.yassine.digitalbanking: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    ledgerEntries-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs
  show-actuator: false

app:
  jwt:
    secret: ${JWT_SECRET:your-super-secret-jwt-key-minimum-256-bits-long-for-security}
    expiration: 86400000  # 24 hours in milliseconds
    refresh-expiration: 604800000  # 7 days

---
spring:
  config:
    activate:
      on-profile: dev

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;TRACE_LEVEL_SYSTEM_OUT=0
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    ma.yassine.digitalbanking: DEBUG
    org.springframework: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

---
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:mysql://mysql:3306/digital_bank?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: bank_user
    password: bank_password123

  jpa:
    hibernate:
      ddl-auto: update

logging:
  level:
    ma.yassine.digitalbanking: INFO

---
spring:
  config:
    activate:
      on-profile: prod

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  level:
    root: WARN
    ma.yassine.digitalbanking: INFO
