version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: digital-bank-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: digital_bank
      MYSQL_USER: bank_user
      MYSQL_PASSWORD: bank_password123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s
    networks:
      - digital-bank-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: digital-bank-backend
    ports:
      - "8085:8085"
    environment:
      DB_URL: jdbc:mysql://mysql:3306/digital_bank?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
      DB_USERNAME: bank_user
      DB_PASSWORD: bank_password123
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-minimum-256-bits-long-for-security}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      APP_PROFILE: docker
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - digital-bank-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: digital-bank-frontend
    ports:
      - "4200:80"
    environment:
      API_URL: http://backend:8085
    depends_on:
      - backend
    networks:
      - digital-bank-network

volumes:
  mysql_data:
    driver: local

networks:
  digital-bank-network:
    driver: bridge
